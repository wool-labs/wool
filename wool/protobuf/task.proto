syntax = "proto3";

package wool.runtime.protobuf.task;

message Task {
    string version = 1;
    string id = 2;
    bytes callable = 3;
    bytes args = 4;
    bytes kwargs = 5;
    string caller = 6;
    bytes proxy = 7;
    string proxy_id = 8;
    int32 timeout = 9;
    string filename = 10;
    string function = 11;
    int32 line_no = 12;
    string tag = 13;
}

// Minimal envelope for pre-deserialization version extraction.
// Used by the version interceptor to parse field 1 from any
// Task wire format, including future incompatible versions.
message TaskVersionEnvelope {
    string version = 1;
}

message Result {
    bytes dump = 1;
}

message Exception {
    bytes dump = 1;
}

message Worker {
    string id = 1;
    string address = 2;
}
