name: Feature Request
description: Propose a new feature or capability.
labels: ["feature"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What is the feature? Describe the desired behavior.
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why is this feature needed? What problem does it solve?
    validations:
      required: true
  - type: textarea
    id: expected-outcome
    attributes:
      label: Expected outcome
      description: What should be true when this is done?
    validations:
      required: false
