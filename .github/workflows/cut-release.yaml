name: Cut release
description: Cut a release branch and publish a release-candidate.

on:
  workflow_dispatch:
    inputs:
      release-type:
        type: choice
        options:
          - major
          - minor
        default: minor

concurrency:
  group: cut-release
  cancel-in-progress: false

jobs:
  verify-code-changes:
    name: Verify code has changed
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main
      - name: Get touched files
        id: get-touched-files
        uses: ./.github/actions/get-touched-files
        with:
          pathspec: 'wool/src/ wool/pyproject.toml'
      - name: Fail if code hasn't changed
        if: ${{ ! steps.get-touched-files.outputs.touched }}
        run: |
          echo "ERROR: No code changes detected."
          exit 1

  cut-release:
    name: Cut ${{ github.event.inputs.release-type }} release
    needs: verify-code-changes
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      version: ${{ steps.cut-release-branch.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/get-wool-labs-app-token
        id: get-wool-labs-app-token
        with:
          app-id: ${{ secrets.WOOL_LABS_APP_ID }}
          app-installation-id: ${{ secrets.WOOL_LABS_INSTALLATION_ID }}
          app-private-key: ${{ secrets.WOOL_LABS_PRIVATE_KEY }}
      - name: Verify main is up to date
        run: |
          git fetch origin main
          git fetch origin master
          if [[ $(git rev-list --count --left-only origin/master..origin/main) -gt 0 ]]; then
            echo "Error: main is not up to date with master" >&2
            exit 1
          fi
      - name: Configure git with app token
        env:
          APP_TOKEN: ${{ steps.get-wool-labs-app-token.outputs.access-token }}
        run: |
          git config --local http.https://github.com/.extraheader "AUTHORIZATION: basic $(echo -n "x-access-token:${APP_TOKEN}" | base64)"
      - name: Create release branch
        id: cut-release-branch
        env:
          RELEASE_TYPE: ${{ github.event.inputs.release-type }}
        run: |
          version=$(.github/scripts/cut-release.sh "$RELEASE_TYPE" release)
          echo "Release candidate: $version"
          echo "version=$version" >> $GITHUB_OUTPUT
      - name: Checkout release
        uses: actions/checkout@v4
        with:
          ref: release
          token: ${{ steps.get-wool-labs-app-token.outputs.access-token }}
      - name: Tag version
        env:
          VERSION: ${{ steps.cut-release-branch.outputs.version }}
        run: |
          git tag "$VERSION"
          git push origin "$VERSION"
      - name: Create pull request
        env:
          GH_TOKEN: ${{ steps.get-wool-labs-app-token.outputs.access-token }}
          VERSION: ${{ steps.cut-release-branch.outputs.version }}
          WORKFLOW_NAME: ${{ github.workflow }}
          SERVER_URL: ${{ github.server_url }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          if $(.github/scripts/release-pr-exists.sh); then
              echo "Release PR already exists. Exiting..."
              exit 0
          fi
          workflow=$(echo "$WORKFLOW_NAME" | tr '[:upper:]' '[:lower:]')
          body="Auto-generated by the [${workflow}](${SERVER_URL}/${REPO}/actions/runs/${RUN_ID}) workflow."
          version=$(.github/scripts/bump-version.sh minor "$VERSION")
          gh pr create -B master -H release --title "Release ${version}" --body "$body"

  build-release:
    name: Build release
    needs: cut-release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        source: [wool]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/build-release
        with:
          source: ${{ matrix.source }}
          version: ${{ needs.cut-release.outputs.version }}

  create-github-release:
    name: Create GitHub release
    needs: cut-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.cut-release.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          if [[ "$VERSION" == *rc* ]]; then
            prerelease_flag="--prerelease"
          else
            prerelease_flag=""
          fi
          gh release create "$VERSION" \
            --repo "$REPO" \
            --generate-notes \
            $prerelease_flag

  publish-github-release:
    name: Publish release to GitHub
    needs:
      - cut-release
      - build-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    strategy:
      matrix:
        source: [wool]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/publish-github-release
        with:
          source: ${{ matrix.source }}
          version: ${{ needs.cut-release.outputs.version }}

  publish-pypi-release:
    name: Publish release to PyPI
    needs:
      - cut-release
      - build-release
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    strategy:
      matrix:
        source: [wool]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/publish-pypi-release
        with:
          source: ${{ matrix.source }}
          version: ${{ needs.cut-release.outputs.version }}
          pypi-token: ${{ secrets.PYPI_TOKEN }}
